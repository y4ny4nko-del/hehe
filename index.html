<!DOCTYPE html>
<html lang="en>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #e0f2fe 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
       
        .envelope-btn {
            background-color: #ffffff;
            color: #e11d48;
            border: 2px solid #ffe4e6;
            padding: 20px 40px;
            font-size: 18px;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(225, 29, 72, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 2s infinite;
        }

        .envelope-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(225, 29, 72, 0.25);
            background-color: #fff1f2;
        }

        .video-container {
            max-width: 550px;
            width: 90%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: none;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            pointer-events: none; 
            user-select: none;
        }
        
        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-container.reveal {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <button class="envelope-btn" id="openBtn">Tap!</button>

    <div class="video-container" id="videoContainer">
        <video id="myVideo" playsinline>
            <source src="The.mp4" type="video/mp4">
        </video>
    </div>
    
    <script>
        const openBtn = document.getElementById('openBtn');
        const videoContainer = document.getElementById('videoContainer');
        const myVideo = document.getElementById('myVideo');

        openBtn.addEventListener('click', () => {
            openBtn.style.display = 'none';
            videoContainer.style.display = 'block';
            
            myVideo.play().catch(error => {});
            
            setTimeout(() => {
                videoContainer.classList.add('reveal');
            }, 50);
        });
    </script>

</body>
</html>
